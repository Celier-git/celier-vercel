  var btn = document.getElementById('wait-join');

    var email = input.value.trim();

      try {
        fetch('https://docs.google.com/forms/d/e/1FAIpQLSeJtpv0dn1-wzxev6IYGFsgxiWCTZX3D6bcVuRRZnIzAgUqrA/formResponse', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'entry.508754827=' + encodeURIComponent(email)
        }).catch(function () {});
      } catch (e) {}
      document.getElementById('wait-form').style.display = 'none';
      document.getElementById('joined-msg').style.display = 'block';
    }
  }
  btn.addEventListener('click', join);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') join(); });

  // cursor-reactive glow
  var glow = document.getElementById('cursor-glow');
  var gx = 0, gy = 0, tx = 0, ty = 0, raf = null;
  function tick() {
    gx += (tx - gx) * 0.08;
    gy += (ty - gy) * 0.08;
    glow.style.transform = 'translate(' + gx + 'px,' + gy + 'px)';
    if (Math.abs(tx - gx) > 0.5 || Math.abs(ty - gy) > 0.5) { raf = requestAnimationFrame(tick); } else { raf = null; }
  }
  if (window.matchMedia('(pointer: fine)').matches) {
    document.addEventListener('mousemove', function (e) {
      tx = e.clientX; ty = e.clientY;
      glow.style.opacity = '1';
      if (!raf) raf = requestAnimationFrame(tick);
    });
    document.addEventListener('mouseleave', function () { glow.style.opacity = '0'; });
  }
})();
</script>
