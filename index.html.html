<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Celier — Coming Soon</title>
<meta name="description" content="Something is coming to change the way you shop. Join the Celier waitlist.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #080604; }
  * { box-sizing: border-box; }
  a { color: #e6d3b4; text-decoration: none; }
  a:hover { color: #f5e9d2; }
  input::placeholder { color: rgba(235,225,210,0.4); }
  input:focus { outline: none; }
  .social:hover { border-color: rgba(235,215,185,0.5) !important; }
  .joinbtn:hover { filter: brightness(1.06); }
  @media (max-width: 540px) {
    .waitcard { border: none !important; }
    .waitform { flex-direction: column !important; align-items: stretch !important; border: none !important; background: transparent !important; padding: 0 !important; gap: 10px !important; }
    .waitform input { flex: 0 0 auto !important; width: 100% !important; height: 48px !important; padding: 0 16px !important; text-align: center; border: 1px solid rgba(235,215,185,0.2) !important; border-radius: 999px !important; background: rgba(8,6,4,0.65) !important; }
    .waitform button { width: 100% !important; height: 48px !important; padding: 0 24px !important; font-size: 14px !important; }
  }
  @keyframes letterUp { from { opacity: 0; transform: translateY(0.55em); filter: blur(8px); } to { opacity: 1; transform: translateY(0); filter: blur(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes veilFade { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }
  @keyframes markPulse { 0% { opacity: 0; } 30% { opacity: 0.7; } 80% { opacity: 0.7; } 100% { opacity: 0; } }
</style>
</head>
<body>
<div style="position: relative; min-height: 100vh; background: #080604; overflow: hidden; font-family: 'Archivo', sans-serif; display: flex; flex-direction: column;">

  <!-- video background -->
  <video autoplay muted loop playsinline preload="auto" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none;">
    <source src="assets/bg-eye.mp4" type="video/mp4">
  </video>
  <!-- readability overlay -->
  <div style="position: absolute; inset: 0; z-index: 0; pointer-events: none; background: linear-gradient(180deg, rgba(8,6,4,0.5) 0%, rgba(8,6,4,0.35) 42%, rgba(8,6,4,0.72) 100%);"></div>
  <div style="position: absolute; inset: 0; z-index: 0; pointer-events: none; background: radial-gradient(ellipse 90% 80% at 50% 45%, rgba(8,6,4,0) 45%, rgba(8,6,4,0.55) 100%);"></div>

  <!-- reveal veil: the eye opening raises the curtain -->
  <div style="position: absolute; inset: 0; z-index: 4; background: #080604; pointer-events: none; display: flex; align-items: center; justify-content: center; animation: veilFade 0.6s ease 0.7s both;">
    <span style="font-size: 13px; font-weight: 600; letter-spacing: 0.5em; text-transform: uppercase; color: rgba(240,232,218,0.7); padding-left: 0.5em; animation: markPulse 1.3s ease both;">Celier</span>
  </div>

  <!-- main content -->
  <div style="position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: clamp(48px, 9vh, 100px) 20px 0;">

    <div style="display: inline-flex; align-items: center; gap: 8px; padding: 8px 18px; border-radius: 999px; border: 1px solid rgba(235,215,185,0.25); background: rgba(8,6,4,0.45); backdrop-filter: blur(10px); animation: fadeUp 0.6s 0.8s ease both;">
      <span style="width: 6px; height: 6px; border-radius: 50%; background: #c9722e; box-shadow: 0 0 10px rgba(224,143,62,0.9); display: inline-block;"></span>
      <span style="font-size: 12px; font-weight: 500; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(240,232,218,0.85);">Waitlist</span>
    </div>

    <h1 style="margin: clamp(14px, 2.5vh, 28px) 0 0; font-weight: 800; font-size: clamp(38px, min(9vw, 10vh), 96px); line-height: 1.02; letter-spacing: 0.01em; text-transform: uppercase; text-align: center; color: #f2ece0; text-shadow: 0 4px 40px rgba(0,0,0,0.6); display: flex; justify-content: center; flex-wrap: wrap; column-gap: 0.35em;">
      <span style="display: inline-flex;"><span style="animation: letterUp 0.6s 0.85s cubic-bezier(0.2,0.7,0.2,1) both;">C</span><span style="animation: letterUp 0.6s 0.89s cubic-bezier(0.2,0.7,0.2,1) both;">o</span><span style="animation: letterUp 0.6s 0.93s cubic-bezier(0.2,0.7,0.2,1) both;">m</span><span style="animation: letterUp 0.6s 0.97s cubic-bezier(0.2,0.7,0.2,1) both;">i</span><span style="animation: letterUp 0.6s 1.01s cubic-bezier(0.2,0.7,0.2,1) both;">n</span><span style="animation: letterUp 0.6s 1.05s cubic-bezier(0.2,0.7,0.2,1) both;">g</span></span>
      <span style="display: inline-flex;"><span style="animation: letterUp 0.6s 1.09s cubic-bezier(0.2,0.7,0.2,1) both;">s</span><span style="animation: letterUp 0.6s 1.13s cubic-bezier(0.2,0.7,0.2,1) both;">o</span><span style="animation: letterUp 0.6s 1.17s cubic-bezier(0.2,0.7,0.2,1) both;">o</span><span style="animation: letterUp 0.6s 1.21s cubic-bezier(0.2,0.7,0.2,1) both;">n</span></span>
    </h1>

    <div style="margin-top: clamp(12px, 2vh, 22px); display: flex; align-items: flex-start; gap: clamp(10px, 2.5vw, 28px); animation: fadeUp 0.6s 1.15s ease both; max-width: 100%;">
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <span style="font-weight: 700; font-size: clamp(26px, 5vw, 42px); color: #f2ece0; min-width: 2ch; text-align: center; text-shadow: 0 2px 24px rgba(0,0,0,0.6);">?</span>
        <span style="font-size: 10px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(235,225,208,0.6);">Days</span>
      </div>
      <span style="font-weight: 700; font-size: clamp(20px, 4vw, 30px); color: rgba(224,163,92,0.7); margin-top: clamp(2px, 1vw, 8px);">:</span>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <span style="font-weight: 700; font-size: clamp(26px, 5vw, 42px); color: #f2ece0; min-width: 2ch; text-align: center; text-shadow: 0 2px 24px rgba(0,0,0,0.6);">?</span>
        <span style="font-size: 10px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(235,225,208,0.6);">Hours</span>
      </div>
      <span style="font-weight: 700; font-size: clamp(20px, 4vw, 30px); color: rgba(224,163,92,0.7); margin-top: clamp(2px, 1vw, 8px);">:</span>
      <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
        <span style="font-weight: 700; font-size: clamp(26px, 5vw, 42px); color: #f2ece0; min-width: 2ch; text-align: center; text-shadow: 0 2px 24px rgba(0,0,0,0.6);">?</span>
        <span style="font-size: 10px; font-weight: 500; letter-spacing: 0.28em; text-transform: uppercase; color: rgba(235,225,208,0.6);">Minutes</span>
      </div>
    </div>

    <div class="waitcard" style="margin-top: clamp(14px, 2.5vh, 26px); width: min(560px, 100%); border-radius: 20px; border: 1px solid rgba(235,215,185,0.18); background: rgba(10,7,5,0.55); backdrop-filter: blur(18px); box-shadow: 0 30px 80px rgba(0,0,0,0.55); padding: clamp(18px, 3.5vh, 36px) clamp(20px, 6vw, 40px) clamp(16px, 3vh, 32px); text-align: center; animation: fadeUp 0.6s 1.3s ease both;">
      <h2 style="margin: 0; font-weight: 700; font-size: 22px; letter-spacing: 0.02em; text-transform: uppercase; color: #f2ece0;">What is Celier?</h2>
      <p style="margin: 12px auto 0; font-size: 17px; font-weight: 600; letter-spacing: 0.03em; color: #e0a35c;"><span style="color: rgba(238,230,215,0.55); font-weight: 500;">Hint:</span> Try it on. Before buying.</p>
      <p style="margin: 8px auto 0; max-width: 400px; font-size: 14px; line-height: 1.65; color: rgba(238,230,215,0.7);">Join the waitlist to be the first to know.</p>

      <div id="joined-msg" style="display: none; margin-top: clamp(14px, 2.5vh, 24px); padding: 14px; border-radius: 999px; border: 1px solid rgba(224,143,62,0.45); background: rgba(120,60,20,0.3); color: #f5e9d2; font-size: 14px;">You're on the list — we'll be in touch.</div>
      <div id="wait-form" class="waitform" style="margin-top: clamp(14px, 2.5vh, 24px); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; align-items: center; padding: 6px; border-radius: 28px; border: 1px solid rgba(235,215,185,0.2); background: rgba(8,6,4,0.65);">
        <input id="wait-email" type="email" placeholder="Enter email" style="flex: 1 1 170px; min-width: 0; background: transparent; border: none; padding: 10px 16px; font-family: 'Archivo', sans-serif; font-size: 14px; color: #f2ece0;">
        <button id="wait-join" class="joinbtn" style="flex-shrink: 0; border: none; cursor: pointer; padding: 12px 24px; border-radius: 999px; white-space: nowrap; background: linear-gradient(180deg, #eebd7d 0%, #cd8a42 100%); color: #241304; font-family: 'Archivo', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 0.03em; box-shadow: 0 6px 18px rgba(0,0,0,0.45);">Join Waitlist</button>
      </div>
    </div>

    <div style="margin-top: clamp(14px, 3vh, 30px); display: flex; gap: 12px; animation: fadeUp 0.6s 1.45s ease both;">
      <a class="social" href="https://www.instagram.com/celierofficial?igsh=MW01ZmYxN2M5MjZtYg%3D%3D&utm_source=qr" target="_blank" rel="noopener" aria-label="Instagram" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(235,215,185,0.22); background: rgba(8,6,4,0.5); display: flex; align-items: center; justify-content: center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e6d3b4" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="5"></rect><circle cx="12" cy="12" r="4.2"></circle><circle cx="17.4" cy="6.6" r="1.1" fill="#e6d3b4" stroke="none"></circle></svg>
      </a>
      <a class="social" href="#" data-em="hello" data-dm="celier.co.in" onclick="this.href='mailto:'+this.dataset.em+'@'+this.dataset.dm" aria-label="Email" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(235,215,185,0.22); background: rgba(8,6,4,0.5); display: flex; align-items: center; justify-content: center;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e6d3b4" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="3"></rect><path d="M3.5 7l8.5 6 8.5-6"></path></svg>
      </a>
      <a class="social" href="https://www.linkedin.com/company/celierhq/" target="_blank" rel="noopener" aria-label="LinkedIn" style="width: 40px; height: 40px; border-radius: 50%; border: 1px solid rgba(235,215,185,0.22); background: rgba(8,6,4,0.5); display: flex; align-items: center; justify-content: center;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#e6d3b4"><path d="M4.98 3.5a2.49 2.49 0 1 1-.02 4.98 2.49 2.49 0 0 1 .02-4.98zM3 9h4v12H3zM9 9h3.8v1.7h.05c.53-.95 1.83-1.95 3.77-1.95 4.03 0 4.78 2.6 4.78 5.98V21h-4v-5.6c0-1.34-.03-3.06-1.9-3.06-1.9 0-2.2 1.45-2.2 2.96V21H9z"></path></svg>
      </a>
    </div>
  </div>

  <div style="position: relative; z-index: 2; padding: clamp(10px, 2vh, 18px) 24px clamp(12px, 2.2vh, 22px); display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; font-size: 12px; letter-spacing: 0.05em; color: rgba(235,225,208,0.5); text-align: center; animation: fadeUp 0.6s 1.5s ease both;">
    <span>©2026 Celier</span>
    <span style="opacity: 0.5;">•</span>
    <span>AI-*** virtual try-on for ****</span>
  </div>
</div>

<script>
(function () {
  var input = document.getElementById('wait-email');
  var btn = document.getElementById('wait-join');
  function join() {
    var email = input.value.trim();
    if (email.length > 3 && email.indexOf('@') !== -1) {
      try {
        fetch('https://docs.google.com/forms/d/e/1FAIpQLSeJtpv0dn1-wzxev6IYGFsgxiWCTZX3D6bcVuRRZnIzAgUqrA/formResponse', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: 'entry.508754827=' + encodeURIComponent(email)
        }).catch(function () {});
      } catch (e) {}
      document.getElementById('wait-form').style.display = 'none';
      document.getElementById('joined-msg').style.display = 'block';
    }
  }
  btn.addEventListener('click', join);
  input.addEventListener('keydown', function (e) { if (e.key === 'Enter') join(); });
})();
</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
